- id: "005"
  name: "Qiping Pan"
  handle: "@ppppqp"
  platform: "github"
  github: "ppppqp"
  text: 'Bub is another general purpose agent (similar to openclaw). It implements an interesting memory management strategy using "tape". Tape is initially created for multi-team work.'
  ref: "https://ppppqp.github.io/blog/2026-03-16-bub/"

- id: "006"
  name: "Yisheng Gong"
  handle: "@gongyisheng"
  platform: "github"
  github: "gongyisheng"
  text: "One genuine advantage: this (Tape) makes subagent history searchable — instead of losing a subagent's full exploration when it returns a summary, the tape preserves everything and lets the parent agent retrieve details later."
  ref: "https://blog.yellowday.day/posts/context_engineering_from_the_inside_out/"


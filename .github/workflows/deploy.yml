name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # 02:00 Asia/Shanghai

permissions:
  contents: write

concurrency:
  group: bub-deploy
  cancel-in-progress: false

jobs:
  sync-upstream:
    runs-on: self-hosted
    if: github.event_name == 'schedule'
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/bubbuild/bub.git 2>/dev/null || true
          git fetch upstream main
          git merge upstream/main --no-edit || {
            echo "::warning::Merge conflict while syncing upstream/main; deployment skipped"
            git merge --abort
            exit 1
          }
          git push origin main

  deploy:
    runs-on: self-hosted
    needs: [sync-upstream]
    if: always() && !cancelled() && (needs.sync-upstream.result == 'success' || needs.sync-upstream.result == 'skipped')
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build image
        run: docker build --pull -t bub:latest .

      - name: Restart container
        run: |
          docker stop bub 2>/dev/null || true
          docker rm bub 2>/dev/null || true
          docker run -d \
            --name bub \
            --network host \
            --restart unless-stopped \
            --env-file /opt/bub/.env \
            -v /opt/bub/data:/root/.bub \
            -v /opt/bub/workspace:/workspace \
            -v /opt/bub/cache/pip:/root/.cache/pip \
            -v /opt/bub/cache/uv:/root/.cache/uv \
            bub:latest

      - name: Health check
        run: |
          sleep 10
          docker logs bub --tail 50
          docker ps --filter "name=^/bub$" --filter "status=running" --format "{{.Names}}" | grep -qx bub
